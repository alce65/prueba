<!DOCTYPE html>

<html lang="es">
<head>
	<meta name="keywords" content="web, learning, html5, css3, angularJS">
	<meta name="author" content="Alejandro" >
	<meta name="description" content="Ejercicios de AngularJS">
	<meta name="generator" content="Sublime Text">
	<meta charset="UTF-8">
	<title>..</title>
	<link rel="stylesheet" href="css/default.css">
	<link rel="icon" href="fav_icon.png">
</head>

<body ng-app = "appModule" ng-controller= "AppController">
	<header>
		<h1>Prueba_01</h1>
	</header>
	<article>
		<h2>Prueba de un checkbox</h2>
		<p>
			<input id="print" type="checkbox" ng-model="print" ng-change="avisarPrint()">
			<label for="print">Imprimir resultado</label>		
		</p>
		<p>
			<input id="tono" type="checkbox" ng-model="isClaro" 
			ng-true-value=("claro") ng-false-value=("oscuro")>
			<label for="tono">Tono claro</label>			
		</p>
		<h2>Resultado</h2>
		<p>
		Opción print seleccionada: {{print}}</br>
		Opción claro seleccionada: {{isClaro}}
		</p>
		<p>
			<select ng-model="miProvinciaSeleccionada" ng-options="provincia as provincia.nombre for provincia in provincias track by provincia.idProvincia" >
  				<option value="">--Elige opcion--</option>
			</select>
		</p>
	</article>
		<footer>
		<p>Alejandro L. Cerezo - Madrid 2015</p>
	</footer>
	<script type="text/javascript" src="../lib/angular/angular.min.js"></script>
	<script type="text/javascript" src="js/appModule_01.js"></script>
</body>
</html>
